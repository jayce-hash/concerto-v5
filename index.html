<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#F8F7F4"/>
<title>Concerto+</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet"/>
<style>
:root {
  --paper:  #F8F7F4;
  --ink:    #121E36;
  --ink60:  rgba(18,30,54,.6);
  --ink30:  rgba(18,30,54,.3);
  --ink10:  rgba(18,30,54,.08);
  --rule:   rgba(18,30,54,.1);
  --silver: #C0C0C0;
  --white:  #ffffff;
  --serif:  'Cormorant Garamond', 'Times New Roman', serif;
  --sans:   'DM Sans', system-ui, sans-serif;
  --spring: cubic-bezier(.16,1,.3,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--paper);-webkit-tap-highlight-color:transparent}
body{font-family:var(--sans);font-size:15px;color:var(--ink);-webkit-font-smoothing:antialiased;overflow:hidden;position:fixed;width:100%}
button{cursor:pointer;background:none;border:none;color:inherit;font-family:var(--sans);padding:0}
input{font-family:var(--sans)}
a{color:inherit;text-decoration:none}

/* APP */
.app{position:fixed;inset:0;display:flex;flex-direction:column;background:var(–paper)}

/* HEADER */
.hd{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:20px 24px 0}
.hd-logo-name{font-family:var(–serif);font-size:15px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;display:block;line-height:1}
.hd-logo-tier{font-size:8px;font-weight:400;letter-spacing:.32em;text-transform:uppercase;color:var(–silver);margin-top:2px;display:block}
.hd-back{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:400;letter-spacing:.06em;color:var(–ink60);opacity:0;pointer-events:none;transition:opacity .25s}
.hd-back.on{opacity:1;pointer-events:all}
.hd-back svg{width:12px;height:12px;stroke:currentColor;stroke-width:1.5;fill:none}

/* TRACK */
.track{flex-shrink:0;display:flex;align-items:center;padding:16px 24px 0;gap:0}
.track-seg{flex:1;height:1px;background:var(–rule);position:relative;overflow:hidden}
.track-seg::after{content:’’;position:absolute;inset:0;background:var(–ink);transform:scaleX(0);transform-origin:left;transition:transform .5s var(–spring)}
.track-seg.filled::after{transform:scaleX(1)}
.track-seg.active::after{transform:scaleX(.45)}
.track-num{font-size:9px;font-weight:500;letter-spacing:.12em;color:var(–ink30);padding:0 8px;flex-shrink:0;transition:color .3s}
.track-num.lit{color:var(–ink)}

/* SCREENS */
.screens{flex:1;position:relative;overflow:hidden}
.screen{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;opacity:0;pointer-events:none;transform:translateX(28px);transition:opacity .4s var(–spring),transform .4s var(–spring)}
.screen.active{opacity:1;pointer-events:all;transform:none}
.screen.exit{opacity:0;transform:translateX(-20px);pointer-events:none}

/* SHARED */
.lbl{font-size:9px;font-weight:500;letter-spacing:.3em;text-transform:uppercase;color:var(–silver);display:block;margin-bottom:12px}
.cta{display:block;width:100%;background:var(–ink);color:var(–paper);padding:18px 24px;font-size:10px;font-weight:500;letter-spacing:.3em;text-transform:uppercase;text-align:center;transition:opacity .15s;border:none;cursor:pointer}
.cta:active{opacity:.8}
.cta:disabled{opacity:.28;cursor:default}

/* ── S1 ── */
.s1-in{padding:32px 24px 0}
.s1-eye{font-size:9px;font-weight:500;letter-spacing:.32em;text-transform:uppercase;color:var(–silver);margin-bottom:14px}
.s1-hed{font-family:var(–serif);font-size:clamp(44px,12vw,58px);font-weight:300;line-height:.93;letter-spacing:-.01em;margin-bottom:18px}
.s1-hed em{font-style:italic}
.s1-deck{font-size:14px;font-weight:300;color:var(–ink60);line-height:1.55;margin-bottom:32px}

.sf{border-bottom:1.5px solid var(–ink);display:flex;align-items:center;gap:10px;padding-bottom:12px}
.sf-ico{color:var(–ink30);flex-shrink:0}
.sf-inp{flex:1;background:transparent;border:none;outline:none;font-size:18px;font-weight:300;color:var(–ink);min-width:0}
.sf-inp::placeholder{color:var(–ink30)}

.cr{border-bottom:1px solid var(–rule);display:flex;align-items:center;gap:10px;padding:11px 0 10px;margin-bottom:24px}
.cr-pre{font-size:9px;font-weight:500;letter-spacing:.24em;text-transform:uppercase;color:var(–ink30);flex-shrink:0}
.cr-inp{flex:1;background:transparent;border:none;outline:none;font-size:13px;font-weight:300;color:var(–ink);min-width:0}
.cr-inp::placeholder{color:var(–ink30)}

.s-note{font-size:12px;font-weight:300;color:var(–ink60);text-align:center;padding:12px 0 8px;min-height:38px}

.ev-list{padding-bottom:48px}
.ev-row{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;padding:20px 0;border-bottom:1px solid var(–rule);animation:up .36s var(–spring) both}
@keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.ev-row:nth-child(1){animation-delay:.04s}
.ev-row:nth-child(2){animation-delay:.08s}
.ev-row:nth-child(3){animation-delay:.12s}
.ev-row:nth-child(4){animation-delay:.16s}
.ev-row:nth-child(n+5){animation-delay:.20s}
.ev-info{flex:1;min-width:0}
.ev-artist{font-family:var(–serif);font-size:22px;font-weight:400;line-height:1.15;margin-bottom:3px}
.ev-where{font-size:12px;font-weight:300;color:var(–ink60);line-height:1.4}
.ev-when{font-size:11px;font-weight:500;color:var(–ink);margin-top:5px;letter-spacing:.04em}
.ev-sel{flex-shrink:0;align-self:center;border:1px solid var(–rule);padding:9px 16px;font-size:10px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(–ink60);white-space:nowrap;transition:all .18s}
.ev-row.picked .ev-sel,.ev-sel:active{background:var(–ink);color:var(–paper);border-color:var(–ink)}

/* ── S2 ── */
.s2-in{padding:26px 0 80px}
.show-strip{margin:0 24px 30px;display:flex;align-items:center;gap:12px;padding:14px 16px;border:1px solid var(–rule);background:var(–white)}
.ss-dot{width:6px;height:6px;border-radius:50%;background:var(–ink);flex-shrink:0}
.ss-txt{font-size:13px;font-weight:300;color:var(–ink);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.vs{padding:0 24px;margin-bottom:30px}

.tile-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(–rule);border:1px solid var(–rule);overflow:hidden}
.tile{background:var(–white);padding:17px 15px 15px;display:flex;flex-direction:column;position:relative;min-height:76px;cursor:pointer;transition:background .15s;-webkit-tap-highlight-color:transparent}
.tile.on{background:var(–ink)}
.tile-name{font-size:16px;font-weight:400;color:var(–ink);line-height:1.2;margin-bottom:2px;transition:color .15s}
.tile.on .tile-name{color:var(–paper)}
.tile-sub{font-size:11px;font-weight:300;color:var(–ink60);transition:color .15s}
.tile.on .tile-sub{color:rgba(248,247,244,.5)}
.tile-ck{position:absolute;top:13px;right:13px;width:17px;height:17px;border:1px solid var(–rule);border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .15s}
.tile-ck svg{opacity:0;transition:opacity .12s}
.tile.on .tile-ck{background:var(–paper);border-color:var(–paper)}
.tile.on .tile-ck svg{opacity:1}

.tri{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(–rule);border:1px solid var(–rule);overflow:hidden}
.tri-it{background:var(–white);padding:14px 8px;text-align:center;cursor:pointer;transition:background .15s;-webkit-tap-highlight-color:transparent}
.tri-it.on{background:var(–ink)}
.tri-main{font-size:14px;font-weight:400;color:var(–ink);display:block;margin-bottom:1px;transition:color .15s}
.tri-it.on .tri-main{color:var(–paper)}
.tri-hint{font-size:10px;font-weight:300;color:var(–ink60);display:block;transition:color .15s}
.tri-it.on .tri-hint{color:rgba(248,247,244,.48)}

.hotel-f{display:flex;align-items:center;gap:10px;border-bottom:1px solid var(–rule);padding-bottom:12px;transition:border-color .2s}
.hotel-f:focus-within{border-bottom-color:var(–ink)}
.hotel-lbl{font-size:9px;font-weight:500;letter-spacing:.22em;text-transform:uppercase;color:var(–ink30);flex-shrink:0}
.hotel-inp{flex:1;background:transparent;border:none;outline:none;font-size:15px;font-weight:300;color:var(–ink);min-width:0}
.hotel-inp::placeholder{color:var(–ink30)}

.build-pad{padding:28px 24px 0}

/* ── S3 ── */
.s3-in{padding-bottom:60px}

.load-st{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:80px 32px;text-align:center}
.load-st.gone{display:none}
.load-ring{width:28px;height:28px;border:1.5px solid var(–rule);border-top-color:var(–ink);border-radius:50%;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-lbl{font-family:var(–serif);font-size:21px;font-weight:300;font-style:italic;color:var(–ink)}
.load-sub{font-size:12px;font-weight:300;color:var(–ink60)}

.plan-out{display:none}
.plan-out.show{display:block}

.plan-hero{padding:30px 24px 24px;border-bottom:1px solid var(–rule)}
.plan-eye{font-size:9px;font-weight:500;letter-spacing:.32em;text-transform:uppercase;color:var(–silver);margin-bottom:10px}
.plan-name{font-family:var(–serif);font-size:clamp(36px,10vw,52px);font-weight:300;line-height:.94;letter-spacing:-.01em;margin-bottom:8px}
.plan-meta{font-size:13px;font-weight:300;color:var(–ink60);line-height:1.5}
.plan-dp{display:inline-flex;align-items:center;margin-top:12px;border:1px solid var(–rule);padding:5px 13px;font-size:11px;font-weight:500;letter-spacing:.1em;color:var(–ink)}

.tl-sec{padding:28px 24px 0}
.tl-hd-lbl{font-size:9px;font-weight:500;letter-spacing:.32em;text-transform:uppercase;color:var(–silver);margin-bottom:26px}

.tl-list{position:relative}
.tl-list::before{content:’’;position:absolute;left:56px;top:0;bottom:0;width:1px;background:linear-gradient(to bottom,transparent,var(–rule) 6%,var(–rule) 94%,transparent)}

.tl-row{display:grid;grid-template-columns:56px 1fr;padding-bottom:26px;animation:up .4s var(–spring) both;position:relative}
.tl-t{font-size:11px;font-weight:400;color:var(–ink60);padding-top:2px;text-align:right;padding-right:18px;white-space:nowrap;line-height:1.3}
.tl-r{position:relative}
.tl-r::before{content:’’;position:absolute;left:-4px;top:5px;width:7px;height:7px;border-radius:50%;background:var(–paper);border:1.5px solid var(–silver);z-index:1}
.tl-row.show-r .tl-r::before{background:var(–ink);border-color:var(–ink);width:9px;height:9px;left:-5px;top:4px;box-shadow:0 0 0 3px var(–ink10)}
.tl-lname{font-family:var(–serif);font-size:21px;font-weight:400;color:var(–ink);line-height:1.15;margin-bottom:4px}
.tl-row.show-r .tl-lname{font-size:25px;font-style:italic}
.tl-lname a{border-bottom:1px solid var(–ink10);transition:border-color .15s}
.tl-lname a:active{border-color:var(–ink)}
.tl-note{font-size:13px;font-weight:300;color:var(–ink60);line-height:1.6}

.picks-sec{padding:32px 0 0;border-top:1px solid var(–rule);margin-top:10px}
.picks-hd{font-size:9px;font-weight:500;letter-spacing:.32em;text-transform:uppercase;color:var(–silver);margin-bottom:22px;padding:0 24px}
.picks-cat{margin-bottom:26px}
.picks-cat-lbl{font-size:12px;font-weight:400;color:var(–ink);letter-spacing:.04em;margin-bottom:10px;padding:0 24px}
.picks-rail{display:flex;gap:10px;overflow-x:auto;padding:0 24px 2px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.picks-rail::-webkit-scrollbar{display:none}
.pk{flex:0 0 148px;border:1px solid var(–rule);background:var(–white);overflow:hidden;display:block;transition:border-color .18s;-webkit-tap-highlight-color:transparent}
.pk:active{border-color:var(–ink)}
.pk-img{height:84px;background:var(–paper);overflow:hidden}
.pk-img img{width:100%;height:100%;object-fit:cover;display:block}
.pk-body{padding:10px 11px 12px}
.pk-name{font-family:var(–serif);font-size:15px;font-weight:400;color:var(–ink);line-height:1.2;margin-bottom:3px}
.pk-why{font-size:11px;font-weight:300;color:var(–ink60);line-height:1.5;margin-bottom:5px}
.pk-meta{font-size:10px;font-weight:400;color:var(–silver);letter-spacing:.04em}

.plan-acts{display:flex;gap:1px;margin:26px 24px 0;border:1px solid var(–rule);overflow:hidden}
.plan-act{flex:1;padding:15px 10px;font-size:10px;font-weight:500;letter-spacing:.22em;text-transform:uppercase;color:var(–ink60);text-align:center;background:var(–white);transition:all .18s}
.plan-act:active{background:var(–ink);color:var(–paper)}

.plan-err{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:80px 32px;text-align:center}
.plan-err.gone{display:none}
.plan-err-msg{font-family:var(–serif);font-size:19px;font-weight:300;font-style:italic;color:var(–ink);line-height:1.4}
.plan-err-retry{font-size:10px;font-weight:500;letter-spacing:.24em;text-transform:uppercase;color:var(–ink60);padding:10px 0;border-bottom:1px solid var(–rule)}

@keyframes nudge{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.tile.nudge{animation:nudge .3s ease-in-out}
</style>

</head>

<script>
(function(){
'use strict';
const TM='oMkciJfNTvAuK1N4O1XXe49pdPEeJQuh';
let cur=0,ev=null,vibes=[],pace='balanced',arrival=60,psvc=null;
const VC={
  coffee:{label:'Coffee',type:'cafe',kw:'coffee shop'},
  lunch:{label:'Lunch',type:'restaurant',kw:'lunch restaurant'},
  dinner:{label:'Dinner',type:'restaurant',kw:'dinner restaurant'},
  latenight:{label:'Late-night',type:'restaurant',kw:'late night food'},
  drinks:{label:'Cocktails',type:'bar',kw:'cocktail bar'},
  wine:{label:'Wine',type:'bar',kw:'wine bar'},
  nightlife:{label:'Nightlife',type:'night_club',kw:'nightclub'},
  dessert:{label:'Dessert',type:'bakery',kw:'dessert'},
};
const $=id=>document.getElementById(id);
const toDate=s=>{try{return s?new Date(s):null}catch{return null}};
const fmtT=d=>d?d.toLocaleTimeString([],{hour:'numeric',minute:'2-digit'}):'';
const fmtD=d=>d?d.toLocaleDateString(undefined,{weekday:'short',month:'long',day:'numeric',year:'numeric'}):'Date TBA';
function hav(aLat,aLng,bLat,bLng){const r=x=>x*Math.PI/180,R=3958.8,dl=r(bLat-aLat),dg=r(bLng-aLng),a=Math.sin(dl/2)**2+Math.cos(r(aLat))*Math.cos(r(bLat))*Math.sin(dg/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))}
function mUrl(p){return p.placeId?`https://www.google.com/maps/place/?q=place_id:${encodeURIComponent(p.placeId)}`:`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(p.name||'')}`}

function goTo(n){
  const ss=document.querySelectorAll('.screen');
  ss[cur].classList.remove('active');ss[cur].classList.add('exit');
  setTimeout(()=>ss[cur].classList.remove('exit'),420);
  cur=n;ss[n].classList.add('active');ss[n].scrollTop=0;
  $('seg0').className='track-seg'+(n>=1?' filled':' active');
  $('seg1').className='track-seg'+(n>=2?' filled':n===1?' active':'');
  $('tn1').className='track-num'+(n>=1?' lit':'');
  $('tn2').className='track-num'+(n>=2?' lit':'');
  $('backBtn').classList.toggle('on',n>0);
}
$('backBtn').addEventListener('click',()=>{if(cur>0)goTo(cur-1)});

async function search(){
  const kw=($('kwInput').value||'').trim(),city=($('cityInput').value||'').trim();
  if(!kw&&!city){$('s1Note').textContent='Enter an artist, team, or venue.';return}
  $('s1Note').textContent='Searching…';$('evList').innerHTML='';ev=null;
  try{
    const u=new URL('https://app.ticketmaster.com/discovery/v2/events.json');
    u.searchParams.set('apikey',TM);u.searchParams.set('size','30');u.searchParams.set('locale','*');
    if(kw)u.searchParams.set('keyword',kw);if(city)u.searchParams.set('city',city);
    const j=await fetch(u).then(r=>r.json());
    const raw=(j?._embedded?.events||[]).map(e=>{
      const att=(e._embedded?.attractions||[])[0],ven=(e._embedded?.venues||[])[0]||{},loc=ven.location||{};
      return{id:e.id,name:e.name||'',artist:att?.name||'',venue:ven.name||'',city:[ven.city?.name,ven.state?.stateCode].filter(Boolean).join(', '),dateTime:e.dates?.start?.dateTime||null,lat:loc.latitude?Number(loc.latitude):null,lng:loc.longitude?Number(loc.longitude):null,addr:[ven.address?.line1,ven.city?.name,ven.state?.stateCode].filter(Boolean).join(', ')};
    });
    const seen=new Map();
    const evs=raw.filter(e=>{
      const k=`${(e.artist||e.name).toLowerCase()}|${e.venue.toLowerCase()}|${(e.dateTime||'').slice(0,10)}`,bad=/suite|box|parking|hospitality/i.test(e.name);
      if(seen.has(k)){if(!bad&&/suite|box|parking|hospitality/i.test(seen.get(k).name))seen.set(k,e);return false}
      seen.set(k,e);return true;
    });
    if(!evs.length){$('s1Note').textContent='No events found — try a different search.';return}
    $('s1Note').textContent=`${evs.length} event${evs.length===1?'':'s'} found`;
    renderEvs(evs);
  }catch(e){console.error(e);$('s1Note').textContent='Could not reach Ticketmaster. Try again.'}
}

function renderEvs(evs){
  const list=$('evList');list.innerHTML='';
  evs.forEach((e,i)=>{
    const dt=toDate(e.dateTime),row=document.createElement('div');
    row.className='ev-row';row.style.animationDelay=`${Math.min(i*.04,.22)}s`;
    row.innerHTML=`<div class="ev-info"><div class="ev-artist">${e.artist||e.name||'Event'}</div><div class="ev-where">${[e.venue,e.city].filter(Boolean).join(' · ')}</div>${dt?`<div class="ev-when">${fmtD(dt)} · ${fmtT(dt)}</div>`:''}</div><button class="ev-sel">Select</button>`;
    row.querySelector('.ev-sel').addEventListener('click',()=>{
      document.querySelectorAll('.ev-row').forEach(r=>r.classList.remove('picked'));
      row.classList.add('picked');ev=e;
      setTimeout(()=>{const dt2=toDate(e.dateTime);$('ssTxt').textContent=`${e.artist||e.name}  ·  ${e.venue}${dt2?'  ·  '+fmtT(dt2):''}`;goTo(1)},180);
    });
    list.appendChild(row);
  });
}

document.querySelectorAll('.tile').forEach(btn=>{
  btn.addEventListener('click',()=>{
    btn.classList.toggle('on');const v=btn.dataset.v,i=vibes.indexOf(v);
    if(i>=0)vibes.splice(i,1);else vibes.push(v);

});
$('paceG').addEventListener('click',e=>{const b=e.target.closest('.tri-it');if(!b)return;document.querySelectorAll('#paceG .tri-it').forEach(x=>x.classList.remove('on'));b.classList.add('on');pace=b.dataset.p});
$('arrG').addEventListener('click',e=>{const b=e.target.closest('.tri-it');if(!b)return;document.querySelectorAll('#arrG .tri-it').forEach(x=>x.classList.remove('on'));b.classList.add('on');arrival=Number(b.dataset.m)});

function geocode(addr){return new Promise(r=>{if(!window.google?.maps)return r(null);new google.maps.Geocoder().geocode({address:addr},(res,st)=>{if(st==='OK'&&res[0]){const l=res[0].geometry.location;r({lat:l.lat(),lng:l.lng()})}else r(null)})})}

function showErr(msg){$('planErrMsg').textContent=msg;$('planErr').classList.remove('gone')}
$('retryBtn').addEventListener('click',()=>{$('planErr').classList.add('gone');goTo(1)});
function initP(){if(psvc||!window.google?.maps?.places)return;psvc=new google.maps.places.PlacesService(document.createElement('div'))}
function nearby({loc,type,kw,max=8}){return new Promise(r=>{initP();if(!psvc||!loc)return r([]);try{psvc.nearbySearch({location:new google.maps.LatLng(loc.lat,loc.lng),rankBy:google.maps.places.RankBy.DISTANCE,type,keyword:kw},(results,status)=>{if(status===google.maps.places.PlacesServiceStatus.OK&&Array.isArray(results)){r(results.slice(0,max).map(p=>({name:p.name||'',placeId:p.place_id,lat:p.geometry?.location?.lat()??null,lng:p.geometry?.location?.lng()??null,rating:typeof p.rating==='number'?p.rating:null,price:typeof p.price_level==='number'?p.price_level:null,address:p.vicinity||'',photos:p.photos||[]})))}else r([])})}catch{r([])}})}

async function callClaude({ev,vibes,pace,arrival,hotel,byVibe,loc}){
  const dt=toDate(ev.dateTime),sum={};
  for(const[v,ps]of Object.entries(byVibe))sum[v]=ps.slice(0,6).map(p=>({name:p.name,address:p.address,rating:p.rating,price:p.price,distMi:p.lat&&p.lng&&loc?+hav(loc.lat,loc.lng,p.lat,p.lng).toFixed(2):null}));
  const sys=`You are Concerto's AI concierge — the precision of a luxury hotel concierge combined with the taste of a lifelong concert-goer. Every recommendation is specific, opinionated, and earned. Never generic. Respond ONLY with valid JSON.`;
  const msg=`Build a complete day-of plan.

SHOW: ${ev.artist||ev.name}
VENUE: ${ev.venue}, ${ev.city}
DATE: ${dt?fmtD(dt):'TBA'}
SHOW TIME: ${dt?fmtT(dt):'TBA'}
PACE: ${pace} — chill=2 stops max, balanced=3–4, packed=5–6
ARRIVE AT VENUE: ${arrival} min before show
HOTEL: ${hotel||'not specified'}
VIBES: ${vibes.join(', ')||'open'}

NEARBY PLACES (use ONLY these):
${JSON.stringify(sum,null,2)}

RULES:
1. Build complete "timeline" from first activity through end of night.
2. Always include the show (isShow:true).
3. If hotel given, open with getting-ready entry.
4. Time pre-show stops to end ${arrival} min before show. Post-show starts 20 min after show ends (assume 2.5hr).
5. Each "note": 1–2 sentences, specific — what to order, local tip, what makes it special. Never "great atmosphere."
6. Picks: 2–3 best options per vibe. Each "why": one specific, opinionated sentence.
7. Pick best by rating + fit, not just proximity.

RESPOND ONLY with:
{"timeline":[{"time":"5:30 PM","label":"Dinner at Rossoblu","note":"The tajarin with rabbit ragù is the reason people come.","placeName":"Rossoblu","vibe":"dinner","isShow":false}],"picks":{"dinner":[{"name":"Rossoblu","why":"Scott Conant's best work — the handmade pasta alone justifies the reservation."}]}}`;
  const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-5-20251001',max_tokens:1800,system:sys,messages:[{role:'user',content:msg}]})});
  const data=await res.json();
  return JSON.parse((data?.content?.[0]?.text||'{}').replace(/```json|```/g,'').trim());
}

$('buildBtn').addEventListener('click',async()=>{
  if(!ev){goTo(0);return}
  if(!vibes.length){
    document.querySelectorAll('.tile').forEach(t=>t.classList.add('nudge'));
    setTimeout(()=>document.querySelectorAll('.tile').forEach(t=>t.classList.remove('nudge')),600);
    return;
  }
  let loc=null;
  if(typeof ev.lat==='number'&&typeof ev.lng==='number')loc={lat:ev.lat,lng:ev.lng};
  else loc=await geocode(ev.addr||`${ev.venue} ${ev.city}`);
  if(!loc){
    $('loadSt').classList.add('gone');
    showErr(`Couldn't locate ${ev.venue}. Try a different event.`);
    return;
  }
  const hotel=($('hotelInp').value||'').trim();
  goTo(2);$('loadSt').classList.remove('gone');$('planOut').classList.remove('show');$('planErr').classList.add('gone');
  try{
    const byVibe={};
    await Promise.all(vibes.map(async v=>{const c=VC[v];if(!c)return;byVibe[v]=await nearby({loc,type:c.type,kw:c.kw,max:8})}));
    const plan=await callClaude({ev,vibes,pace,arrival,hotel,byVibe,loc});
    render(plan,byVibe,loc);
  }catch(e){console.error(e);$('loadSt').classList.add('gone');showErr('Something went wrong building your plan. Tap to try again.');
  }
});

function render(plan,byVibe,loc){
  $('loadSt').classList.add('gone');
  const dt=toDate(ev.dateTime);
  $('pName').textContent=ev.artist||ev.name||'Your Show';
  $('pMeta').textContent=[ev.venue,ev.city].filter(Boolean).join(' · ');
  $('pDate').textContent=dt?fmtD(dt):'Date TBA';
  const tl=$('tlList');tl.innerHTML='';
  const flat=Object.values(byVibe).flat();
  (plan.timeline||[]).forEach((item,i)=>{
    const place=flat.find(p=>p.name===item.placeName),url=place?mUrl(place):null;
    const row=document.createElement('div');
    row.className='tl-row'+(item.isShow?' show-r':'');
    row.style.animationDelay=`${i*.065}s`;
    let lbl=item.label||'';
    if(url&&item.placeName&&!item.isShow)lbl=lbl.replace(item.placeName,`<a href="${url}" target="_blank" rel="noopener">${item.placeName}</a>`);
    row.innerHTML=`<div class="tl-t">${item.time||''}</div><div class="tl-r"><div class="tl-lname">${lbl}</div>${!item.isShow&&item.note?`<div class="tl-note">${item.note}</div>`:''}</div>`;
    tl.appendChild(row);
  });
  const ps=$('picksSec');ps.innerHTML='';
  const pd=plan.picks||{},any=vibes.some(v=>(pd[v]||[]).length>0);
  if(any){
    const hd=document.createElement('div');hd.className='picks-hd';hd.textContent='Nearby Picks';ps.appendChild(hd);
    vibes.forEach(v=>{
      const picks=pd[v];if(!picks?.length)return;
      const cat=document.createElement('div');cat.className='picks-cat';
      const lbl=document.createElement('div');lbl.className='picks-cat-lbl';lbl.textContent=VC[v]?.label||v;cat.appendChild(lbl);
      const rail=document.createElement('div');rail.className='picks-rail';
      picks.forEach(pick=>{
        const rp=flat.find(p=>p.name===pick.name),href=rp?mUrl(rp):'#';
        const d=rp?.lat&&rp?.lng&&loc?hav(loc.lat,loc.lng,rp.lat,rp.lng):null;
        const meta=[d!=null?`${d.toFixed(1)} mi`:null,rp?.rating!=null?`★ ${rp.rating.toFixed(1)}`:null,rp?.price!=null?'$'.repeat(Math.max(1,Math.min(4,rp.price))):null].filter(Boolean).join(' · ');
        const card=document.createElement('a');card.className='pk';card.href=href;card.target='_blank';card.rel='noopener';
        const img_w=document.createElement('div');img_w.className='pk-img';
        if(rp?.photos?.[0]?.getUrl){const img=document.createElement('img');img.src=rp.photos[0].getUrl({maxWidth:310,maxHeight:180});img.alt=pick.name;img_w.appendChild(img)}
        card.appendChild(img_w);
        const body=document.createElement('div');body.className='pk-body';
        body.innerHTML=`<div class="pk-name">${pick.name}</div><div class="pk-why">${pick.why||''}</div>${meta?`<div class="pk-meta">${meta}</div>`:''}`;
        card.appendChild(body);rail.appendChild(card);
      });
      cat.appendChild(rail);ps.appendChild(cat);
    });
  }
  $('planOut').classList.add('show');
}

});
