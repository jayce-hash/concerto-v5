<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<title>Concerto+ · Day Planner</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

/* GLOBAL */

body{
margin:0;
font-family:Inter,system-ui;
background:#F8F9F9;
color:#121E36;
}

.page{
max-width:900px;
margin:auto;
padding:20px;
}

/* HEADER */

.page-header{
text-align:center;
padding:30px 10px;
}

.brand-logo{
width:60px;
margin-bottom:10px;
}

.feature-title{
font-size:34px;
margin:0;
}

.tagline{
color:#6b7280;
margin-top:6px;
}

/* BUTTONS */

button{
font-family:inherit;
cursor:pointer;
}

.btn-primary{
background:#121E36;
color:white;
border:none;
padding:12px 18px;
border-radius:10px;
font-weight:600;
}

.btn-secondary{
background:white;
border:1px solid #ddd;
padding:10px 16px;
border-radius:10px;
}

.btn-ghost{
background:none;
border:none;
color:#121E36;
}

/* CARD STACK */

.step-pill{
margin-bottom:18px;
transition:all .35s ease;
}

.step-pill-header{

width:100%;
background:white;
border-radius:16px;
border:none;
padding:20px;

display:flex;
justify-content:space-between;
align-items:center;

box-shadow:0 10px 30px rgba(0,0,0,.06);
}

.step-pill-header:hover{
transform:translateY(-2px);
box-shadow:0 16px 40px rgba(0,0,0,.08);
}

.step-pill-body{
overflow:hidden;
max-height:0;
opacity:0;
transition:all .4s ease;
}

.step-pill.open .step-pill-body{
max-height:2000px;
opacity:1;
margin-top:12px;
}

.step-pill.completed .step-pill-header{
border-left:5px solid #121E36;
}

/* TEXT */

.step-number{
font-weight:700;
margin-right:10px;
}

.step-pill-label{
display:flex;
align-items:center;
}

.step-text-block{
display:flex;
flex-direction:column;
}

.step-title{
font-weight:600;
}

.step-subtitle{
font-size:13px;
color:#6b7280;
}

/* CARD */

.card{
background:white;
padding:20px;
border-radius:14px;
box-shadow:0 6px 18px rgba(0,0,0,.06);
}

/* FORM */

input{
padding:10px;
border-radius:8px;
border:1px solid #ddd;
width:100%;
}

.form-grid{
display:grid;
grid-template-columns:1fr;
gap:16px;
}

.tiny{
font-size:12px;
color:#6b7280;
}

/* PILLS */

.pill-row{
display:flex;
flex-wrap:wrap;
gap:10px;
}

.pill{

padding:8px 14px;
border-radius:999px;
border:1px solid #ddd;
background:white;

}

.pill.active{
background:#121E36;
color:white;
}

/* SEGMENT */

.seg-row{
display:flex;
gap:10px;
}

.seg-pill{
padding:8px 14px;
border-radius:999px;
border:1px solid #ddd;
background:white;
}

.seg-pill.active{
background:#121E36;
color:white;
}

/* TIMELINE */

.timeline{
margin-top:20px;
}

.timeline-item{
display:flex;
gap:14px;
margin-bottom:18px;
}

.timeline-time{
width:80px;
font-weight:600;
}

.timeline-card{
flex:1;
background:white;
padding:14px;
border-radius:12px;
box-shadow:0 6px 18px rgba(0,0,0,.06);
}

/* MODAL */

.modal{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
}

.modal-backdrop{
position:absolute;
inset:0;
background:rgba(0,0,0,.5);
}

.modal-card{
background:white;
padding:24px;
border-radius:14px;
width:90%;
max-width:420px;
z-index:2;
}

</style>

</head>

<body>

<div class="page">

<header class="page-header">

<img src="IMG_3180.jpeg" class="brand-logo">

<h1 class="feature-title">Concerto+</h1>

<p class="tagline">
Build a curated concert day from coffee to encore.
</p>

<button class="btn-ghost" id="openHelp">
How it works
</button>

</header>


<!-- STEP 1 -->

<section class="step-pill open" data-step="1">

<button class="step-pill-header">

<div class="step-pill-label">

<span class="step-number">01</span>

<div class="step-text-block">

<div class="step-title">Choose Your Show</div>

<div class="step-subtitle">
Search Ticketmaster for your event
</div>

</div>

</div>

<span>⌄</span>

</button>

<div class="step-pill-body">

<div class="card">

<input placeholder="Artist / Team / Tour">

<br><br>

<input placeholder="City (optional)">

<br><br>

<button class="btn-primary" id="selectEvent">
Select Example Event
</button>

</div>

</div>

</section>



<!-- STEP 2 -->

<section class="step-pill" data-step="2">

<button class="step-pill-header">

<div class="step-pill-label">

<span class="step-number">02</span>

<div class="step-text-block">

<div class="step-title">Plan Your Vibe</div>

<div class="step-subtitle">
Before & after the show
</div>

</div>

</div>

<span>⌄</span>

</button>


<div class="step-pill-body">

<div class="card">

<p>Before the show</p>

<div class="pill-row">

<button class="pill">Coffee</button>
<button class="pill">Lunch</button>
<button class="pill">Dinner</button>
<button class="pill">Shopping</button>

</div>

<br>

<p>After the show</p>

<div class="pill-row">

<button class="pill">Dessert</button>
<button class="pill">Drinks</button>
<button class="pill">Nightlife</button>

</div>

<br>

<button class="btn-primary" id="generatePlan">
Build My Concerto Plan
</button>

</div>

</div>

</section>



<!-- STEP 3 -->

<section class="step-pill" data-step="3">

<button class="step-pill-header">

<div class="step-pill-label">

<span class="step-number">03</span>

<div class="step-text-block">

<div class="step-title">Your Concerto Plan</div>

<div class="step-subtitle">
A smart timeline around your show
</div>

</div>

</div>

<span>⌄</span>

</button>


<div class="step-pill-body">

<div class="card">

<div class="timeline" id="timeline"></div>

</div>

</div>

</section>


</div>



<!-- MODAL -->

<div class="modal" id="modal" hidden>

<div class="modal-backdrop"></div>

<div class="modal-card">

<h3>How Concerto+ Works</h3>

<p>

Select your event → choose your vibe → Concerto builds a curated plan around your venue.

</p>

<button id="closeModal" class="btn-primary">Got it</button>

</div>

</div>



<script>

/* STEP LOGIC */

function openStep(n){

document.querySelectorAll(".step-pill").forEach(step=>{
step.classList.remove("open")
})

document.querySelector(`[data-step="${n}"]`).classList.add("open")

}

function completeStep(n){

document.querySelector(`[data-step="${n}"]`).classList.add("completed")

}

/* STEP EVENTS */

document.getElementById("selectEvent").onclick=()=>{

completeStep(1)

openStep(2)

}

document.getElementById("generatePlan").onclick=()=>{

completeStep(2)

openStep(3)

generateTimeline()

}


/* TIMELINE */

function generateTimeline(){

const timeline=document.getElementById("timeline")

timeline.innerHTML=`

<div class="timeline-item">

<div class="timeline-time">4:30 PM</div>

<div class="timeline-card">
Coffee at Blue Bottle
</div>

</div>

<div class="timeline-item">

<div class="timeline-time">6:00 PM</div>

<div class="timeline-card">
Dinner near the venue
</div>

</div>

<div class="timeline-item">

<div class="timeline-time">7:45 PM</div>

<div class="timeline-card">
Arrive at the venue
</div>

</div>

<div class="timeline-item">

<div class="timeline-time">10:30 PM</div>

<div class="timeline-card">
Drinks after the show
</div>

</div>

`

}


/* MODAL */

const modal=document.getElementById("modal")

document.getElementById("openHelp").onclick=()=>{

modal.hidden=false

}

document.getElementById("closeModal").onclick=()=>{

modal.hidden=true

}

</script>


</body>
</html>
